spring.application.name=NexChat

# Server
server.port=8080

# H2 Database (dev) - switch to PostgreSQL for production
spring.datasource.url=jdbc:h2:file:./nexchat-db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=nexchat
spring.datasource.password=nexchat123
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=NexChatSuperSecretKeyForJWTTokenGenerationAndValidation2024!@#$%^&*
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# AI Integration (Google Gemini - Free)
ai.gemini.api-key=${GEMINI_API_KEY:AQ.Ab8RN6JxU0D9MyRLQu_Ctn0r0VHZR1wSmksW_BZNFkmOytIyfQ}
ai.gemini.base-url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://nex-chat-git-main-yash-yeoles-projects.vercel.app,https://nex-chat-pi685hmus-yash-yeoles-projects.vercel.app

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.nexchat=DEBUG
logging.level.org.springframework.security=INFO
