spring.application.name=NexChat

# Server
server.port=8080

# Database - auto-detects PostgreSQL or H2
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./nexchat-db;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:nexchat}
spring.datasource.password=${DB_PASSWORD:nexchat123}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 Console (only for local dev)
spring.h2.console.enabled=false

# JWT
jwt.secret=NexChatSuperSecretKeyForJWTTokenGenerationAndValidation2024!@#$%^&*
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# AI Integration (Google Gemini)
ai.gemini.api-key=${GEMINI_API_KEY:your-gemini-api-key-here}
ai.gemini.base-url=https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.nexchat=INFO
logging.level.org.springframework.security=WARN